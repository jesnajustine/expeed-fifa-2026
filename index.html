<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FIFA WC 2026 — Expeed Prediction League</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css"/>
<style>
:root{--navy:#0D1B3E;--navy-mid:#152249;--navy-light:#1E2F5C;--red:#C8102E;--red-dark:#a00d24;--red-light:#fde8ec;--gold:#C9A84C;--gold-light:#fdf3db;--offwhite:#f7f8fc;--bg:#f0f2f8;--text:#0D1B3E;--text-2:#2c3e6b;--text-3:#6b7a99;--text-4:#9da8c2;--border:rgba(13,27,62,0.09);--border-2:rgba(13,27,62,0.15);--card:#ffffff;--radius:12px;--radius-sm:8px;--shadow:0 1px 4px rgba(13,27,62,0.08),0 1px 2px rgba(13,27,62,0.04);--shadow-md:0 4px 16px rgba(13,27,62,0.1),0 2px 6px rgba(13,27,62,0.06)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-font-smoothing:antialiased}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--navy);height:58px;padding:0 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;border-bottom:3px solid var(--red)}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-logo{height:28px;object-fit:contain;background:#fff;border-radius:4px;padding:2px 6px}
.topbar-divider{width:1px;height:28px;background:rgba(255,255,255,0.15)}
.topbar-title{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:rgba(255,255,255,0.9);line-height:1}
.topbar-sub{font-size:10px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-top:1px}
.user-pill{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.14);border-radius:100px;padding:5px 12px 5px 6px;cursor:pointer;transition:background .15s}
.user-pill:hover{background:rgba(255,255,255,0.15)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.user-name-top{font-size:13px;color:#fff;font-weight:600}
.screen{display:none}.screen.active{display:block}
.loader{position:fixed;inset:0;background:rgba(13,27,62,0.6);display:none;align-items:center;justify-content:center;z-index:9998;flex-direction:column;gap:12px}
.loader-spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-msg{color:#fff;font-size:14px;font-weight:600}
.main-wrap{display:flex;min-height:calc(100vh - 58px)}
.sidebar{width:220px;background:var(--navy);padding:1.25rem 0;flex-shrink:0;position:sticky;top:58px;height:calc(100vh - 58px);overflow-y:auto}
.sidebar-label{font-size:10px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,0.25);text-transform:uppercase;padding:0 1rem;margin:12px 0 4px}
.sidebar-sec{padding:0 8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;color:rgba(255,255,255,0.55);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:background .15s,color .15s}
.nav-btn i{font-size:18px}
.nav-btn:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.85)}
.nav-btn.active{background:var(--red);color:#fff}
.content{flex:1;padding:1.75rem 1.5rem;max-width:900px;min-width:0}
.page-hdr{margin-bottom:1.5rem}
.page-hdr h2{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:1px;color:var(--navy)}
.page-hdr p{font-size:13px;color:var(--text-3);margin-top:2px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:12px;box-shadow:var(--shadow);transition:box-shadow .15s}
.card:hover{box-shadow:var(--shadow-md)}
.match-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow-md);overflow:hidden}
.match-card-top{background:var(--navy);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.match-group{font-size:12px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,0.6);text-transform:uppercase;display:flex;align-items:center;gap:5px}
.match-body{padding:1.25rem 1.25rem 1rem}
.teams-row{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:1rem}
.team-blk{flex:1;text-align:center}
.team-flag{font-size:40px;display:block;line-height:1;margin-bottom:6px}
.team-name{font-size:15px;font-weight:700;color:var(--navy)}
.ko-blk{text-align:center;flex-shrink:0}
.ko-time{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;color:var(--navy);line-height:1}
.ko-ist{font-size:11px;font-weight:700;color:var(--red);background:var(--red-light);border:1px solid rgba(200,16,46,0.15);padding:2px 8px;border-radius:100px;display:inline-block;margin-top:4px}
.pred-group{display:flex;gap:8px}
.pred-btn{flex:1;padding:11px 8px;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);background:var(--offwhite);color:var(--text-2);font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-align:center;line-height:1.3;transition:all .15s}
.pred-btn:hover{background:var(--bg);transform:translateY(-1px);box-shadow:var(--shadow)}
.pred-btn:active{transform:scale(0.97)}
.pred-sub{font-size:11px;opacity:.6;display:block;margin-top:2px}
.pred-my-pick{text-align:center;margin-bottom:8px}
.locked-chip{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--navy);background:#e8edf8;border:1.5px solid var(--navy-light);padding:8px 16px;border-radius:var(--radius-sm)}
.locked-chip i{color:var(--gold);font-size:16px}
.saved-banner{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;padding:10px 14px;background:#e8edf8;border:1.5px solid var(--navy-light);border-radius:var(--radius-sm);font-size:13px;font-weight:600;color:var(--navy);animation:fadeUp .25s ease}
.saved-banner i{color:var(--red);font-size:16px}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700}
.b-open{background:#e6f9f0;color:#0a6640;border:1px solid rgba(10,102,64,0.2)}
.b-live{background:var(--gold-light);color:#7a5c10;border:1px solid rgba(201,168,76,0.3)}
.b-done{background:#e8edf8;color:var(--navy);border:1px solid rgba(13,27,62,0.15)}
.b-win{background:#e6f9f0;color:#0a6640}
.b-loss{background:var(--red-light);color:var(--red-dark)}
.b-today{background:var(--red);color:#fff}
.b-tbd{background:var(--gold-light);color:#7a5c10;border:1px solid rgba(201,168,76,0.3)}
.match-meta{display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-top:8px}
.match-meta span{font-size:12px;color:var(--text-3);display:flex;align-items:center;gap:3px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem;text-align:center;box-shadow:var(--shadow)}
.stat-box .num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--navy);line-height:1}
.stat-box .lbl{font-size:12px;color:var(--text-3);margin-top:3px;font-weight:600}
.leader-banner{background:var(--navy);border-radius:var(--radius);padding:1.25rem 1.5rem;display:flex;align-items:center;gap:14px;margin-bottom:1rem;box-shadow:var(--shadow-md);border-left:5px solid var(--gold)}
.leader-trophy{font-size:38px;flex-shrink:0}
.leader-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold);text-transform:uppercase}
.leader-nm{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#fff;letter-spacing:.5px;line-height:1.1}
.leader-pts{font-size:13px;color:rgba(255,255,255,0.55);margin-top:2px;font-weight:500}
.lb-list{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.lb-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--offwhite)}
.lb-row.me{background:#e8edf8}
.lb-row.g1{border-left:4px solid var(--gold)}
.lb-row.g2{border-left:4px solid #b0b0b0}
.lb-row.g3{border-left:4px solid #c47a2a}
.lb-rank{width:28px;font-size:14px;font-weight:700;color:var(--text-3);flex-shrink:0;text-align:center}
.lb-name{flex:1;font-size:14px;font-weight:600}
.lb-right{text-align:right}
.lb-pts{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--navy);line-height:1}
.lb-detail{font-size:11px;color:var(--text-3);margin-top:1px;font-weight:500}
.votes-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow);overflow:hidden}
.votes-hdr{background:var(--navy);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.votes-title{font-size:14px;font-weight:700;color:#fff}
.votes-meta{font-size:11px;color:rgba(255,255,255,0.5);margin-top:1px}
.votes-body{padding:1rem 1.25rem}
.bar-row{margin-bottom:10px}
.bar-lbl{display:flex;justify-content:space-between;margin-bottom:4px}
.bar-lbl span{font-size:13px;font-weight:600;color:var(--text-2)}
.bar-lbl em{font-size:12px;color:var(--text-3);font-style:normal}
.bar-track{height:8px;background:var(--bg);border-radius:100px;overflow:hidden}
.bar-fill{height:100%;border-radius:100px}
.fill-h{background:var(--red)}.fill-d{background:var(--gold)}.fill-a{background:#1E2F5C}
.names-sec{padding:0 1.25rem .75rem}
.names-grp{margin-bottom:8px}
.names-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text-4);margin-bottom:5px}
.name-pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{font-size:12px;font-weight:500;padding:3px 9px;border-radius:100px;border:1px solid}
.pill-h{background:var(--red-light);color:var(--red-dark);border-color:rgba(200,16,46,0.2)}
.pill-d{background:var(--gold-light);color:#7a5c10;border-color:rgba(201,168,76,0.3)}
.pill-a{background:#e8edf8;color:var(--navy);border-color:rgba(13,27,62,0.15)}
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem;align-items:center}
.filter-btn{padding:6px 14px;border:1.5px solid var(--border-2);border-radius:100px;background:transparent;font-family:'Barlow',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-2);transition:all .15s}
.filter-btn:hover{background:var(--bg)}
.filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.admin-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:16px;box-shadow:var(--shadow)}
.admin-section h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.5px;color:var(--navy);margin-bottom:1rem}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:13px;font-weight:600;color:var(--text-2)}
.fg input{padding:9px 12px;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);background:var(--offwhite);outline:none;transition:border-color .15s;width:100%}
.fg input:focus{border-color:var(--navy);background:#fff}
.result-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;align-items:center}
.result-btn{padding:5px 11px;border:1px solid var(--border-2);border-radius:var(--radius-sm);background:var(--offwhite);font-family:'Barlow',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;color:var(--text-2)}
.result-btn:hover{background:var(--bg);border-color:var(--navy-light)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-family:'Barlow',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.btn:active{transform:scale(0.97)}
.btn-navy{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-navy:hover{background:var(--navy-mid)}
.btn-outline{background:transparent;color:var(--text-2);border-color:var(--border-2)}
.btn-outline:hover{background:var(--bg)}
.sec-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-4);margin-bottom:10px;margin-top:4px}
.empty{text-align:center;padding:3rem 1rem;color:var(--text-3)}
.empty i{font-size:40px;display:block;margin-bottom:10px;opacity:.3}
.cutoff-warn{display:flex;align-items:center;gap:7px;background:var(--gold-light);border:1px solid rgba(201,168,76,0.25);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-weight:600;color:#7a5c10;margin-bottom:10px}
.tbd-warn{background:var(--gold-light);border:1px solid rgba(201,168,76,0.3);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:#7a5c10;font-weight:500;margin-top:6px;display:flex;align-items:center;gap:8px}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;z-index:9999;opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s;pointer-events:none;max-width:280px;box-shadow:var(--shadow-md)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--navy);color:#fff;border-left:4px solid var(--gold)}
.toast.error{background:var(--red);color:#fff}
.ac-list{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1.5px solid rgba(13,27,62,0.2);border-radius:var(--radius-sm);max-height:200px;overflow-y:auto;z-index:9999;box-shadow:0 8px 24px rgba(13,27,62,0.15)}
.ac-item{padding:10px 14px;font-size:14px;cursor:pointer;border-bottom:.5px solid rgba(13,27,62,0.06);transition:background .1s}
.ac-item:hover,.ac-item.active{background:#e8edf8;color:var(--navy)}
.ac-item em{font-style:normal;font-weight:700;color:var(--red)}
@media(max-width:640px){.sidebar{display:none}.content{padding:1rem;padding-bottom:80px}.stat-box .num{font-size:26px}.team-flag{font-size:32px}.ko-time{font-size:22px}.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:2px solid var(--red);z-index:100}}
@media(min-width:641px){.bottom-nav{display:none}}
.bottom-nav button{flex:1;padding:10px 4px 8px;border:none;background:none;font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;color:rgba(255,255,255,0.4);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s}
.bottom-nav button i{font-size:20px}
.bottom-nav button.active{color:var(--gold)}
</style>
</head>
<body>
<div id="toast" class="toast"></div>
<div id="loader" class="loader"><div class="loader-spinner"></div><div id="loader-msg" class="loader-msg">Loading...</div></div>

  return "<img src=\"https://flagcdn.com/56x42/"+code+".png\" width=\"56\" height=\"42\" style=\"border-radius:4px;object-fit:cover\" alt=\""+n+"\" onerror=\"this.style.display='none'\">";
}
function nowIST(){ const n=new Date(); return new Date(n.getTime()+n.getTimezoneOffset()*60000+5.5*3600000); }
function isTodayIST(d){ const i=nowIST(),t=new Date(d); return t.getFullYear()===i.getFullYear()&&t.getMonth()===i.getMonth()&&t.getDate()===i.getDate(); }
function isCutoff(m){ return Date.now()>=new Date(m.date).getTime()-30*60000; }
function fmtTime(d){ return new Date(d).toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true}); }
function fmtFull(d){ const t=new Date(d); return t.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+", "+t.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit",hour12:true})+" IST"; }
function todayLbl(){ return nowIST().toLocaleDateString("en-IN",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
function isTBD(m){ return m.home==="TBD"||m.away==="TBD"; }
function pLabel(p,m){ if(p==="home")return flag(m.home)+" "+m.home+" wins"; if(p==="draw")return "\u{1F91D} Draw"; if(p==="away")return flag(m.away)+" "+m.away+" wins"; return p; }
function pLabelText(p,m){ if(p==="home")return m.home+" wins"; if(p==="draw")return "Draw"; if(p==="away")return m.away+" wins"; return p; }
function rText(m){
  if(!m.result) return "vs";
  const res=getMatchResult(m);
  if(!res) return "vs";
  const score=res.homeGoals!==null?" ("+res.homeGoals+"-"+res.awayGoals+")":"";
  if(res.outcome==="home") return m.home+" won"+score;
  if(res.outcome==="draw") return "Draw"+score;
  return m.away+" won"+score;
}
function getPred(mid){
  const p=state.predictions[mid]&&state.predictions[mid][currentUser];
  if(!p) return null;
  // Handle both old format (string) and new format (object)
  if(typeof p==="string") return {result:p,homeGoals:null,awayGoals:null};
  return p;
}
function getPredResult(mid){
  const p=getPred(mid);
  return p?p.result:null;
}
function hasPred(mid){ return !!getPred(mid); }
function strip(s){ return s.replace(/[^\u0000-\u007E]/g," ").replace(/\s+/g," ").trim(); }
function toast(msg,type){ type=type||"success"; const t=document.getElementById("toast"); t.textContent=msg; t.className="toast "+type+" show"; setTimeout(()=>t.className="toast",3000); }
function showLoader(msg){ document.getElementById("loader-msg").textContent=msg||"Loading..."; document.getElementById("loader").style.display="flex"; }
function hideLoader(){ document.getElementById("loader").style.display="none"; }

// ── GOOGLE SHEETS API ────────────────────────────────────────
async function apiGet(){
  try{
    const r = await fetch(SCRIPT_URL+"?action=getState&t="+Date.now());
    return r.json();
  }catch(e){return {error:e.message};}
}
async function apiPost(data){
  try{
    // Use no-cors GET with encoded params to avoid CORS issues with Apps Script
    const params = encodeURIComponent(JSON.stringify(data));
    const r = await fetch(SCRIPT_URL+"?payload="+params+"&t="+Date.now());
    return r.json();
  }catch(e){return {error:e.message};}
}

async function loadState(){
  if(!SCRIPT_URL){ state={matches:[],predictions:{}}; hideLoader(); return; }
  try{
    const data = await apiGet();
    if(data.error) throw new Error(data.error);
    state = data;
    hideLoader();
  } catch(e){
    hideLoader();
    toast("Could not load data. Check your connection.","error");
    state = {matches:[],predictions:{}};
  }
}

async function refreshState(){
  if(!SCRIPT_URL) return;
  try{
    const data = await apiGet();
    if(!data.error) state = data;
  } catch(e){}
}

  list.innerHTML=hits.map(n=>{

function acKey(e){
  const list=document.getElementById("ac-list");
  const items=list.querySelectorAll(".ac-item");
  if(!items.length){if(e.key==="Enter")doEmpLogin();return;}
  if(e.key==="ArrowDown"){e.preventDefault();acIdx=Math.min(acIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle("active",i===acIdx));}
  else if(e.key==="ArrowUp"){e.preventDefault();acIdx=Math.max(acIdx-1,-1);items.forEach((el,i)=>el.classList.toggle("active",i===acIdx));}
  else if(e.key==="Enter"){if(acIdx>=0&&items[acIdx])acSel(items[acIdx].dataset.name);else doEmpLogin();}
  else if(e.key==="Escape"){list.style.display="none";acIdx=-1;}
}

// ── SUBMIT PREDICTION ────────────────────────────────────────
async function submitPred(mid,choice,homeGoals,awayGoals){
  const m=state.matches.find(x=>x.id===mid); if(!m)return;
  if(isAdmin){toast("Admins cannot submit predictions.","error");return;}
  if(isTBD(m)){toast("Teams not yet confirmed for this match.","error");return;}
  if(isCutoff(m)){toast("Predictions are closed for this match.","error");return;}
  if(hasPred(mid)){toast("You have already predicted this match.","error");return;}
  showLoader("Saving prediction...");
  const res = await apiPost({action:"predict", token:sessionToken, matchId:mid, choice, homeGoals:homeGoals||null, awayGoals:awayGoals||null});
  hideLoader();
  if(res.error){toast(res.error,"error");return;}
  // Update local state immediately
  if(!state.predictions[mid])state.predictions[mid]={};
  state.predictions[mid][currentUser]={result:choice,homeGoals:homeGoals||null,awayGoals:awayGoals||null};
  lastSaved=mid;
  toast("Prediction saved: "+pLabelText(choice,m));
  rToday(); rAll();
  setTimeout(()=>{lastSaved=null;},4000);
}

// ── ADDITIONS: select/confirm flow, 3-day window, updated renders ─────────────

let pendingPreds={};

function isWithin3Days(m){
  const now=Date.now();
  const matchTime=new Date(m.date).getTime();
  if(matchTime<now) return false;
  // Open predictions for the next 2 match days
  const futureDates=[...new Set(
    state.matches
      .filter(x=>!isTBD(x)&&new Date(x.date).getTime()>now)
      .map(x=>x.date.substring(0,10))
  )].sort();
  if(!futureDates.length) return false;
  const next2Days=futureDates.slice(0,2);
  return next2Days.includes(m.date.substring(0,10));
}

function daysUntil(m){
  return Math.ceil((new Date(m.date).getTime()-Date.now())/(24*60*60*1000));
}

function selectPred(mid,choice){
  const m=state.matches.find(x=>x.id===mid);if(!m)return;
  pendingPreds[mid]={result:choice};
  // Update both possible ID schemes (Today card uses pb-, All Matches uses mc-pb-)
  ["pb-","mc-pb-"].forEach(prefix=>{
    ["home","draw","away"].forEach(c=>{
      const btn=document.getElementById(prefix+mid+"-"+c);
      if(btn)btn.className="pred-btn"+(c===choice?" sel-"+(c==="home"?"home":c==="draw"?"draw":"away"):"");
    });
  });
  ["confirm-","mc-confirm-"].forEach(prefix=>{
    const conf=document.getElementById(prefix+mid);
    if(conf)conf.style.display="block";
  });
  ["sel-label-","mc-sel-label-"].forEach(prefix=>{
    const lbl=document.getElementById(prefix+mid);
    if(lbl)lbl.textContent=pLabelText(choice,m);
  });
  // Update goal input labels for both schemes
  ["","mc-"].forEach(prefix=>{
    const hGoalLbl=document.getElementById(prefix+"glbl-h-"+mid);
    const aGoalLbl=document.getElementById(prefix+"glbl-a-"+mid);
    const hInput=document.getElementById(prefix+"goals-h-"+mid);
    const aInput=document.getElementById(prefix+"goals-a-"+mid);
    if(choice==="draw"){
      if(hGoalLbl)hGoalLbl.textContent="Goals each";
      if(aGoalLbl)aGoalLbl.style.display="none";
      if(aInput){aInput.style.display="none";}
      if(hInput){hInput.oninput=function(){if(aInput)aInput.value=this.value;};}
    } else {
      if(hGoalLbl)hGoalLbl.textContent=m.home+" goals";
      if(aGoalLbl){aGoalLbl.textContent=m.away+" goals";aGoalLbl.style.display="";}
      if(aInput)aInput.style.display="";
      if(hInput)hInput.oninput=null;
    }
  });
}
function cancelPred(mid){
  delete pendingPreds[mid];
  ["pb-","mc-pb-"].forEach(prefix=>{
    ["home","draw","away"].forEach(c=>{
      const btn=document.getElementById(prefix+mid+"-"+c);
      if(btn)btn.className="pred-btn";
    });
  });
  ["confirm-","mc-confirm-"].forEach(prefix=>{
    const conf=document.getElementById(prefix+mid);
    if(conf)conf.style.display="none";
  });
  ["","mc-"].forEach(prefix=>{
    const hg=document.getElementById(prefix+"goals-h-"+mid);
    const ag=document.getElementById(prefix+"goals-a-"+mid);
    if(hg)hg.value="";
    if(ag){ag.value="";ag.style.display="";}
    const aGoalLbl=document.getElementById(prefix+"glbl-a-"+mid);
    if(aGoalLbl)aGoalLbl.style.display="";
  });
}
async function confirmPred(mid){
  const pred=pendingPreds[mid];
  if(!pred||!pred.result){toast("Please select a prediction first.","error");return;}
  // Check both ID schemes - use whichever has a value entered
  const hg1=document.getElementById("goals-h-"+mid);
  const hg2=document.getElementById("mc-goals-h-"+mid);
  const ag1=document.getElementById("goals-a-"+mid);
  const ag2=document.getElementById("mc-goals-a-"+mid);
  const hg=(hg1&&hg1.value.trim())?hg1:(hg2&&hg2.value.trim())?hg2:hg1||hg2;
  const ag=(ag1&&ag1.value.trim())?ag1:(ag2&&ag2.value.trim())?ag2:ag1||ag2;
  const homeGoals=hg?hg.value.trim():"";
  const awayGoals=ag?ag.value.trim():"";
  if(homeGoals===""||awayGoals===""){toast("Please enter the predicted score.","error");return;}
  const hNum=parseInt(homeGoals);
  // For draw, away goals = home goals
  const aNum=pred.result==="draw"?hNum:parseInt(awayGoals);
  if(isNaN(hNum)||isNaN(aNum)||hNum<0||aNum<0){toast("Please enter valid goal numbers.","error");return;}
  const res=pred.result;
  if(res==="home"&&hNum<=aNum){toast("Home goals must be more than away goals for a home win.","error");return;}
  if(res==="away"&&aNum<=hNum){toast("Away goals must be more than home goals for an away win.","error");return;}
  await submitPred(mid,pred.result,hNum,aNum);
  delete pendingPreds[mid];
}

function getMatchResult(m){
  if(!m.result) return null;
  if(m.result.includes(":")){
    const parts=m.result.split(":");
    return {outcome:parts[0],homeGoals:parseInt(parts[1]),awayGoals:parseInt(parts[2])};
  }
  return {outcome:m.result,homeGoals:null,awayGoals:null};
}
function calcPoints(pred,matchResult){
  if(!pred||!matchResult) return 0;
  const pRes=typeof pred==="string"?pred:pred.result;
  const res=matchResult.outcome;
  if(pRes!==res) return 0;
  if(pred.homeGoals!==null&&pred.homeGoals!==undefined&&
     matchResult.homeGoals!==null&&matchResult.homeGoals!==undefined&&
     parseInt(pred.homeGoals)===matchResult.homeGoals&&
     parseInt(pred.awayGoals)===matchResult.awayGoals) return 3;
  return 1;
}
function computeLB(){
  const s={},b={};
  state.matches.forEach(m=>{
    if(!m.result)return;
    const matchResult=getMatchResult(m);
    Object.entries(state.predictions[m.id]||{}).forEach(([u,pred])=>{
      if(!s[u]){s[u]=0;b[u]={perfect:0,correct:0,total:0};}
      b[u].total++;
      const pts=calcPoints(pred,matchResult);
      s[u]+=pts;
      if(pts===3)b[u].perfect++;
      else if(pts===1)b[u].correct++;
    });
  });
  const all=new Set();Object.values(state.predictions).forEach(mp=>Object.keys(mp).forEach(u=>all.add(u)));
  all.forEach(u=>{if(!s[u]){s[u]=0;b[u]={perfect:0,correct:0,total:0};}});
  return Object.entries(s).sort((a,b2)=>{
    if(b2[1]!==a[1])return b2[1]-a[1];
    return a[0].localeCompare(b2[0]);
  }).map(([n,sc])=>({name:n,score:sc,...b[n]}));
}

      +'<div style="font-size:12px;color:var(--text-3)">'+(done?rText(m):"vs")+'</div>'
      +'<div style="flex:1;text-align:right;font-size:14px;font-weight:700">'+m.away+' '+flag(m.away)+'</div></div>'
      +'<div class="match-meta"><span>'+fmtFull(m.date)+'</span><span>'+m.group+'</span>'
      +'<span class="badge" style="background:var(--offwhite);color:var(--text-2);border:1px solid var(--border-2)">'
      +strip(pLabel(pRes,m))+(p&&p.homeGoals!==null?' ('+p.homeGoals+'-'+p.awayGoals+')':'')+'</span>'
      +(done?'<span class="badge '+(perfect?"b-win":ok?"b-win":"b-loss")+'">'+(perfect?"&#127919; Perfect":ok?"&#10003; Right result":"&#10007; Wrong")+'</span>'
        :'<span class="badge" style="background:var(--bg);color:var(--text-3)">Awaiting result</span>')
      +(done&&pts!==null?'<span class="badge" style="background:var(--navy);color:#fff">+'+pts+' pts</span>':'')
      +'</div></div>';
  });
  el.innerHTML=h;
}

function rVotes(){
  const el=document.getElementById("tab-votes");
  const voted=new Set();Object.values(state.predictions).forEach(mp=>Object.keys(mp).forEach(n=>voted.add(n)));
  let h='<div class="page-hdr"><h2>Votes Overview</h2><p>Prediction split for every match &mdash; '+voted.size+' employees have participated so far</p></div>'
    +'<div id="votes-list">'+buildVL()+"</div>";
  el.innerHTML=h;
}
function buildVL(){
  const done=state.matches.filter(m=>!!m.result&&!isTBD(m));
  const active=state.matches.filter(m=>!m.result&&isCutoff(m)&&!isTBD(m));
  const open=state.matches.filter(m=>!m.result&&!isCutoff(m)&&isWithin3Days(m)&&!isTBD(m));
  const ms=[...done,...active,...open];
  if(!ms.length)return '<div class="empty"><i class="ti ti-ghost"></i><p>No matches with predictions yet.</p></div>';
  return ms.map(m=>{
    const preds=state.predictions[m.id]||{},total=Object.keys(preds).length;
    const hC=Object.values(preds).filter(v=>(typeof v==="string"?v:v.result)==="home").length;
    const dC=Object.values(preds).filter(v=>(typeof v==="string"?v:v.result)==="draw").length;
    const aC=Object.values(preds).filter(v=>(typeof v==="string"?v:v.result)==="away").length;
    const hP=total?Math.round(hC/total*100):0,dP=total?Math.round(dC/total*100):0,aP=total?Math.round(aC/total*100):0;
    const badge=m.result?'<span class="badge b-done">'+rText(m)+'</span>':isCutoff(m)?'<span class="badge b-live">Closed</span>':'<span class="badge b-open">Open</span>';
    return '<div class="votes-card"><div class="votes-hdr"><div><div class="votes-title">'+flag(m.home)+' '+m.home+' vs '+flag(m.away)+' '+m.away+'</div><div class="votes-meta">'+fmtFull(m.date)+' &middot; '+m.group+(total>0?' &middot; '+total+' prediction'+(total!==1?'s':''):'')+'</div></div>'+badge+'</div>'
      +(total===0?'<div style="padding:1rem 1.25rem;font-size:13px;color:var(--text-4);font-style:italic">No predictions yet.</div>'
        :'<div class="votes-body">'
          +'<div class="bar-row"><div class="bar-lbl"><span>'+flag(m.home)+' '+m.home+' wins</span><em>'+hC+' ('+hP+'%)</em></div><div class="bar-track"><div class="bar-fill fill-h" style="width:'+hP+'%"></div></div></div>'
          +'<div class="bar-row"><div class="bar-lbl"><span>&#129309; Draw</span><em>'+dC+' ('+dP+'%)</em></div><div class="bar-track"><div class="bar-fill fill-d" style="width:'+dP+'%"></div></div></div>'
          +'<div class="bar-row"><div class="bar-lbl"><span>'+flag(m.away)+' '+m.away+' wins</span><em>'+aC+' ('+aP+'%)</em></div><div class="bar-track"><div class="bar-fill fill-a" style="width:'+aP+'%"></div></div></div>'
          +'</div>'
      )+'</div>';
  }).join("");
}

function rAdmin(){
  const el=document.getElementById("tab-admin");
  let h='<div class="page-hdr"><h2>Admin Panel</h2><p>Update team names and enter match results</p></div>';
  h+='<div class="admin-section"><h3>Apps Script URL</h3>'
    +'<div style="display:flex;gap:8px;align-items:center"><input id="gs-url-input" style="flex:1;padding:9px 12px;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:Barlow,sans-serif;font-size:13px" placeholder="https://script.google.com/macros/s/..." value="'+SCRIPT_URL+'" />'
    +'<button type="button" class="btn btn-navy" onclick="saveURL()"><i class="ti ti-check"></i> Save</button></div></div>';
  const tbdM=state.matches.filter(m=>isTBD(m));
  if(tbdM.length){
    h+='<div class="admin-section"><h3>Update Knockout Team Names</h3>';
    tbdM.slice(0,10).forEach(m=>{
      h+='<div class="card" style="margin-bottom:10px"><div style="font-size:13px;font-weight:600;color:var(--navy);margin-bottom:8px">'+m.group+' &mdash; '+fmtFull(m.date)+'</div>'
        +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
        +'<div class="fg"><label>Home Team</label><div style="position:relative"><input id="tbd-h-'+m.id+'" placeholder="Type team name..." value="'+(m.home==="TBD"?"":m.home)+'" autocomplete="off" data-input="tbd-h-'+m.id+'" data-list="tbd-ac-h-'+m.id+'" oninput="tbdAC(this,this.dataset.input,this.dataset.list)" style="width:100%;padding:9px 12px;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:Barlow,sans-serif;font-size:14px" /><div id="tbd-ac-h-'+m.id+'" class="ac-list" style="display:none"></div></div></div>'
        +'<div class="fg"><label>Away Team</label><div style="position:relative"><input id="tbd-a-'+m.id+'" placeholder="Type team name..." value="'+(m.away==="TBD"?"":m.away)+'" autocomplete="off" data-input="tbd-a-'+m.id+'" data-list="tbd-ac-a-'+m.id+'" oninput="tbdAC(this,this.dataset.input,this.dataset.list)" style="width:100%;padding:9px 12px;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:Barlow,sans-serif;font-size:14px" /><div id="tbd-ac-a-'+m.id+'" class="ac-list" style="display:none"></div></div></div>'
        +'</div><div style="margin-top:8px"><button type="button" class="btn btn-navy" onclick="updateTBD(this.dataset.id)" data-id="'+m.id+'"><i class="ti ti-check"></i> Update</button></div></div>';
    });
    h+='</div>';
  }
  h+='<div class="admin-section"><h3>Enter Match Results</h3>'
    +'<p style="font-size:13px;color:var(--text-3);margin-bottom:10px">Enter the final score — the app calculates who gets 3pts (perfect score) or 1pt (right result) automatically.</p>';
  const played=state.matches.filter(m=>isCutoff(m)&&!isTBD(m));
  if(!played.length){h+='<p style="font-size:13px;color:var(--text-4);font-style:italic">No matches have reached kickoff yet.</p>';}
  played.forEach(m=>{
    const mr=m.result?getMatchResult(m):null;
    const scoreStr=mr&&mr.homeGoals!==null?mr.homeGoals+' - '+mr.awayGoals:'';
    h+='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">'
      +'<div style="font-size:14px;font-weight:700">'+flag(m.home)+' '+m.home+' vs '+m.away+' '+flag(m.away)+'</div>'
      +(m.result?'<span class="badge b-done">'+rText(m)+'</span>':'<span class="badge b-live">Awaiting result</span>')
      +'</div><div class="match-meta"><span>'+fmtFull(m.date)+'</span><span>'+m.group+'</span></div>'
      +(!m.result
        ?'<div style="margin-top:10px">'
          +'<div style="font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:8px">Final Score</div>'
          +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--text-3);margin-bottom:4px">'+m.home+'</div>'
          +'<input type="number" id="rg-h-'+m.id+'" min="0" max="20" placeholder="0" style="width:55px;padding:8px;text-align:center;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:Barlow,sans-serif;font-size:18px;font-weight:700;color:var(--navy)"></div>'
          +'<div style="font-size:18px;font-weight:700;color:var(--text-3)">-</div>'
          +'<div style="text-align:center"><div style="font-size:11px;color:var(--text-3);margin-bottom:4px">'+m.away+'</div>'
          +'<input type="number" id="rg-a-'+m.id+'" min="0" max="20" placeholder="0" style="width:55px;padding:8px;text-align:center;border:1.5px solid var(--border-2);border-radius:var(--radius-sm);font-family:Barlow,sans-serif;font-size:18px;font-weight:700;color:var(--navy)"></div>'
          +'</div>'
          +'<div class="result-row"><span style="font-size:12px;color:var(--text-3);align-self:center">Result:</span>'
          +'<button type="button" class="result-btn" onclick="setResult(this.dataset.id,this.dataset.r)" data-id="'+m.id+'" data-r="home">'+m.home+' wins</button>'
          +'<button type="button" class="result-btn" onclick="setResult(this.dataset.id,this.dataset.r)" data-id="'+m.id+'" data-r="draw">Draw</button>'
          +'<button type="button" class="result-btn" onclick="setResult(this.dataset.id,this.dataset.r)" data-id="'+m.id+'" data-r="away">'+m.away+' wins</button>'
          +'</div></div>'
        :'<div style="margin-top:8px"><button type="button" class="btn btn-outline" style="font-size:12px;padding:5px 10px" onclick="clearResult(this.dataset.id)" data-id="'+m.id+'"><i class="ti ti-refresh"></i> Clear result</button></div>'
      )+'</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

function saveURL(){
  const url=document.getElementById("gs-url-input").value.trim();
  if(!url){toast("Please enter a URL.","error");return;}
  SCRIPT_URL=url;localStorage.setItem(SK+"-url",url);
  toast("URL saved!");loadState().then(()=>rAdmin());
}

async function updateTBD(mid){
  const hn=document.getElementById("tbd-h-"+mid).value.trim();
  const an=document.getElementById("tbd-a-"+mid).value.trim();
  if(!hn||!an){toast("Please enter both team names.","error");return;}
  showLoader("Updating...");
  const res=await apiPost({action:"updateTeams",adminToken:"Kakkanad2026fifa",matchId:mid,home:hn,away:an});
  hideLoader();
  if(res.error){toast(res.error,"error");return;}
  const m=state.matches.find(x=>x.id===mid);if(m){m.home=hn;m.away=an;}
  toast("Teams updated!");rAdmin();
}

async function setResult(mid,r){
  const hg=document.getElementById("rg-h-"+mid);
  const ag=document.getElementById("rg-a-"+mid);
  const homeGoals=hg?hg.value.trim():"";
  const awayGoals=ag?ag.value.trim():"";
  if(homeGoals===""||awayGoals===""){toast("Please enter the final score before saving.","error");return;}
  const hNum=parseInt(homeGoals);
  const aNum=parseInt(awayGoals);
  if(isNaN(hNum)||isNaN(aNum)||hNum<0||aNum<0){toast("Please enter valid goal numbers.","error");return;}
  if(r==="home"&&hNum<=aNum){toast("Home goals must be more than away goals for a home win.","error");return;}
  if(r==="away"&&aNum<=hNum){toast("Away goals must be more than home goals for an away win.","error");return;}
  if(r==="draw"&&hNum!==aNum){toast("Goals must be equal for a draw.","error");return;}
  showLoader("Saving result...");
  const res=await apiPost({action:"setResult",adminToken:"Kakkanad2026fifa",matchId:mid,result:r,homeGoals:hNum,awayGoals:aNum});
  hideLoader();
  if(res.error){toast(res.error,"error");return;}
  const m=state.matches.find(x=>x.id===mid);
  if(m)m.result=r+":"+hNum+":"+aNum;
  toast("Result saved! Leaderboard updated.");rAdmin();
}

async function clearResult(mid){
  showLoader("Clearing...");
  const res=await apiPost({action:"clearResult",adminToken:"Kakkanad2026fifa",matchId:mid});
  hideLoader();
  if(res.error){toast(res.error,"error");return;}
  const m=state.matches.find(x=>x.id===mid);if(m)m.result=null;
  toast("Result cleared.");rAdmin();
}

document.addEventListener("click",function(e){
  const list=document.getElementById("ac-list");
  if(list&&!list.contains(e.target)&&e.target.id!=="emp-name")list.style.display="none";
  const menu=document.getElementById("logout-menu");
  const pill=document.getElementById("user-pill");
  if(menu&&pill&&!pill.contains(e.target))menu.style.display="none";
  document.querySelectorAll('[id^="tbd-ac-"]').forEach(l=>{
    if(!l.contains(e.target))l.style.display="none";
  });
});

loadState();
